<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; }
  .swatch-box { height: 48px; border-radius: var(--radius-sm); }
  .swatch-name { font-size: 9px; font-weight: 600; color: var(--fg-secondary); margin-top: 4px; }
  .swatch-hex  { font-size: 9px; color: var(--fg-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch"><div class="swatch-box" style="background:#F6F7F8; border:1px solid #e0e0e0"></div><div class="swatch-name">50</div><div class="swatch-hex">#F6F7F8</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#ECEEF1"></div><div class="swatch-name">100</div><div class="swatch-hex">#ECEEF1</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#D8DCE1"></div><div class="swatch-name">200</div><div class="swatch-hex">#D8DCE1</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#B8BFC9"></div><div class="swatch-name">300</div><div class="swatch-hex">#B8BFC9</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#8B95A3"></div><div class="swatch-name">400</div><div class="swatch-hex">#8B95A3</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#5C6878"></div><div class="swatch-name">500</div><div class="swatch-hex">#5C6878</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#3E4A57"></div><div class="swatch-name">600</div><div class="swatch-hex">#3E4A57</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#2B3540"></div><div class="swatch-name">700</div><div class="swatch-hex">#2B3540</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#1C252C"></div><div class="swatch-name">800</div><div class="swatch-hex">#1C252C</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#111820"></div><div class="swatch-name">900</div><div class="swatch-hex">#111820</div></div>
</div>
</body>
</html>
