<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 20px 24px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; margin-bottom: 14px; }

  /* Primary button — .borderedProminent */
  .btn-primary {
    background: var(--nostos-teal-mid);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    padding: 6px 14px;
    font-family: var(--font-sans);
    font-size: var(--text-base);
    font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { background: var(--nostos-teal-light); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

  /* Bordered button */
  .btn-bordered {
    background: transparent;
    color: var(--fg-primary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 5px 13px;
    font-family: var(--font-sans);
    font-size: var(--text-base);
    font-weight: 500;
    cursor: pointer;
  }
  .btn-bordered:hover { background: var(--nostos-neutral-100); }

  /* Borderless / plain */
  .btn-plain {
    background: none; border: none;
    color: var(--accent);
    font-family: var(--font-sans);
    font-size: var(--text-base);
    font-weight: 500;
    cursor: pointer; padding: 4px 0;
  }

  /* Destructive */
  .btn-destructive {
    background: none; border: none;
    color: var(--nostos-red);
    font-family: var(--font-sans);
    font-size: var(--text-base);
    font-weight: 500;
    cursor: pointer; padding: 5px 13px;
    border: 1px solid var(--nostos-red);
    border-radius: var(--radius-md);
  }
</style>
</head>
<body>
  <div class="row">
    <button class="btn-primary">▶ Start Scan</button>
    <button class="btn-primary">⬇ Back Up Now</button>
    <button class="btn-primary" disabled>Scanning…</button>
  </div>
  <div class="row">
    <button class="btn-bordered">Choose…</button>
    <button class="btn-bordered">Change Vault…</button>
    <button class="btn-plain">Clear</button>
    <button class="btn-plain">Show Details</button>
  </div>
  <div class="row">
    <button class="btn-destructive">Remove All</button>
  </div>
</body>
</html>
