<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #ECEEF1; font-family: var(--font-sans); padding: 20px 24px; }

  .groupbox {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    margin-bottom: 12px;
  }
  .groupbox-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--fg-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
  }
  .hstack { display: flex; align-items: center; gap: 10px; }
  .path-text { font-size: 12px; color: var(--fg-secondary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn-bordered {
    background: transparent; color: var(--fg-primary);
    border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 4px 10px; font-size: 12px; font-weight: 500; cursor: pointer; flex-shrink: 0;
  }
  .progress-track { height: 6px; background: var(--nostos-neutral-200); border-radius: 3px; overflow: hidden; }
  .progress-fill  { height: 100%; background: var(--nostos-teal-mid); border-radius: 3px; width: 63%; }
  .stat-row { display: flex; gap: 24px; margin-top: 10px; }
  .stat-label { font-size: 11px; color: var(--fg-secondary); }
  .stat-val   { font-size: 17px; font-weight: 700; color: var(--fg-primary); }
</style>
</head>
<body>
  <div class="groupbox">
    <div class="groupbox-label">Source Folder</div>
    <div class="hstack">
      <div class="path-text">/Users/andrew/Pictures/Family</div>
      <button class="btn-bordered">Choose…</button>
    </div>
  </div>
  <div class="groupbox">
    <div class="groupbox-label">Progress</div>
    <div class="progress-track"><div class="progress-fill"></div></div>
    <div class="stat-row">
      <div><div class="stat-label">Files Found</div><div class="stat-val">1,842</div></div>
      <div><div class="stat-label">Processed</div><div class="stat-val" style="color:var(--nostos-teal-mid)">1,163</div></div>
      <div><div class="stat-label">Duplicates</div><div class="stat-val" style="color:var(--nostos-orange)">47</div></div>
    </div>
  </div>
</body>
</html>
