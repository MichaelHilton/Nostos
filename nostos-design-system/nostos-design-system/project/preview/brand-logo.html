<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 20px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .logo-wrap { background: var(--nostos-neutral-50); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px 28px; display: flex; align-items: center; gap: 14px; }
  .logo-wrap.dark { background: #1C252C; border-color: #2B3540; }
  img { display: block; }
  .lockup { display: flex; flex-direction: column; gap: 2px; }
  .wordmark { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: -0.03em; color: var(--nostos-navy); line-height: 1; }
  .tagline { font-family: var(--font-sans); font-size: 12px; color: var(--fg-secondary); letter-spacing: 0.01em; }
  .wordmark.light-text { color: #E8EDF2; }
  .tagline.light-text { color: #8B95A3; }
</style>
</head>
<body>
  <div class="logo-wrap">
    <img src="../assets/logo_square.png" width="52" height="52">
    <div class="lockup">
      <div class="wordmark">nostos</div>
      <div class="tagline">Self-Hosted Photo Management</div>
    </div>
  </div>
  <div class="logo-wrap dark">
    <img src="../assets/logo_square.png" width="52" height="52">
    <div class="lockup">
      <div class="wordmark light-text">nostos</div>
      <div class="tagline light-text">Self-Hosted Photo Management</div>
    </div>
  </div>
  <div class="logo-wrap" style="padding: 16px">
    <img src="../assets/logo_square.png" width="32" height="32">
    <div style="font-family:var(--font-display); font-size:15px; font-weight:700; color:var(--nostos-navy)">Nostos</div>
  </div>
</body>
</html>
