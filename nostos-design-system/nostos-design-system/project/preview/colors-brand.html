<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: var(--bg-base); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .swatch { width: 80px; }
  .swatch-box { height: 56px; border-radius: var(--radius-md); }
  .swatch-name { font-size: 10px; font-weight: 600; color: var(--fg-secondary); margin-top: 5px; }
  .swatch-hex  { font-size: 10px; color: var(--fg-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch"><div class="swatch-box" style="background:#203238"></div><div class="swatch-name">Navy</div><div class="swatch-hex">#203238</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#200E96"></div><div class="swatch-name">Indigo</div><div class="swatch-hex">#200E96</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#2BABB8"></div><div class="swatch-name">Teal Light</div><div class="swatch-hex">#2BABB8</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#1B7A8A"></div><div class="swatch-name">Teal Mid</div><div class="swatch-hex">#1B7A8A</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#1A5068"></div><div class="swatch-name">Teal Dark</div><div class="swatch-hex">#1A5068</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#C4932A"></div><div class="swatch-name">Gold</div><div class="swatch-hex">#C4932A</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#BA8A88"></div><div class="swatch-name">Rose</div><div class="swatch-hex">#BA8A88</div></div>
  <div class="swatch"><div class="swatch-box" style="background:#FAcEFF; border: 1px solid #e0d8e8"></div><div class="swatch-name">Lavender</div><div class="swatch-hex">#FAcEFF</div></div>
</div>
</body>
</html>
