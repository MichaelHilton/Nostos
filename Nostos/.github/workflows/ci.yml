name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: fwal/setup-swift@v3
        with:
          swift-version: '5.9'

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Run tests
        run: swift test --enable-test-discovery
